<div id="oneway-root">

  <!-- A – aktiv -->
  <div class="unit" id="unit-A">
    <h2>A</h2>

    <div class="cube-row">
      <div class="cube cube-45">A1 – 45°</div>
      <div class="cube cube-90">A2 – 90°</div>
    </div>

    <button class="trigger" data-respo="A">Trigger A</button>
  </div>

  <!-- B – sekundär aktiv -->
  <div class="unit" id="unit-B">
    <h2>B</h2>

    <div class="cube-row">
      <div class="cube cube-45">B1 – 45°</div>
      <div class="cube cube-90">B2 – 90°</div>
    </div>

    <button class="trigger" data-respo="B">Trigger B</button>
  </div>

  <!-- C – passiv (nur Struktur) -->
  <div class="unit passive" id="unit-C">
    <h2>C</h2>
    <div class="placeholder">C (passiv)</div>
  </div>

</div>
