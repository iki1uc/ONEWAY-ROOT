<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ONEWAY‑ROOT – Mond/Sonne</title>

<style>
body {
    background:#000;
    color:#fff;
    font-family:monospace;
    text-align:center;
    padding-top:80px;
}

/* Sonne */
.sun {
    width:120px;
    height:120px;
    background:#ff0;
    border-radius:50%;
    box-shadow:0 0 40px #ff0;
    margin:auto;
    display:none;
}

/* Mond */
.moon {
    width:120px;
    height:120px;
    background:#ccc;
    border-radius:50%;
    box-shadow:0 0 40px #ccc;
    margin:auto;
    display:none;
}
</style>

</head>

<body>

<div id="sun" class="sun"></div>
<div id="moon" class="moon"></div>

<script>
let state = 0;

setInterval(() => {
    if(state === 0) {
        document.getElementById("sun").style.display = "block";
        document.getElementById("moon").style.display = "none";
        state = 1;
    } else {
        document.getElementById("sun").style.display = "none";
        document.getElementById("moon").style.display = "block";
        state = 0;
    }
}, 3000);
</script>

</body>
</html>
